name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native runners: full build + vet + race + coverage via the Taskfile.
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Taskfile ci
        run: task ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.arch }}
          path: cover.out
          if-no-files-found: ignore

  # Emulated runners: cross-compile per-package test binaries and run them
  # under QEMU via docker. This validates the non-x86 64-bit Go targets,
  # including big-endian s390x.
  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu_cpu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu_cpu: power9
          - arch: s390x
            image: debian:trixie
            qemu_cpu: qemu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Register binfmt handlers
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Cross-compile and run tests under QEMU
        env:
          GOWORK: off
          GOARCH: ${{ matrix.arch }}
          GOOS: linux
          CGO_ENABLED: 0
          IMAGE: ${{ matrix.image }}
          QEMU_CPU: ${{ matrix.qemu_cpu }}
        run: |
          set -euo pipefail
          mkdir -p testbins
          # Compile one test binary per package (cover instrumented, no race
          # — the race detector is not supported under cross/QEMU here).
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/.' '__')
            if go test -c -cover -covermode=atomic -o "testbins/${name}.test" "$pkg" 2>compile.log; then
              echo "compiled $pkg -> testbins/${name}.test"
            else
              # Packages with no test files produce no binary; skip them.
              if grep -q "no test files" compile.log; then
                echo "no test files in $pkg, skipping"
              else
                cat compile.log
                exit 1
              fi
            fi
          done

          # Run every compiled test binary under QEMU inside the target image.
          docker run --rm \
            --platform "linux/${GOARCH}" \
            -e QEMU_CPU="${QEMU_CPU}" \
            -v "$PWD:/work" -w /work \
            "${IMAGE}" \
            sh -c '
              set -e
              status=0
              for b in testbins/*.test; do
                [ -f "$b" ] || continue
                echo "=== running $b (linux/'"${GOARCH}"') ==="
                ./"$b" -test.v -test.coverprofile="${b}.cover" || status=1
              done
              exit $status
            '
